<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="theme-color" content="#ef4444" />

    <!-- Base SEO (overridden per-page by react-helmet-async) -->
    <title>Promptova – The AI Prompt Universe</title>
    <meta name="description" content="Promptova — Discover and copy the best AI image prompts for Midjourney, Stable Diffusion, DALL-E, and more. Cinematic, anime, fantasy, fashion prompts and beyond." />
    <meta name="keywords" content="AI prompts, Midjourney prompts, Stable Diffusion, anime prompts, cinematic prompts, ChatGPT prompts, AI art, prompt gallery" />
    <meta name="author" content="Promptova" />
    <meta name="robots" content="index,follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.promptova.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Promptova" />
    <meta property="og:title" content="Promptova – The AI Prompt Universe" />
    <meta property="og:description" content="Discover and copy premium AI image prompts. Cinematic, anime, fantasy, fashion and more." />
    <meta property="og:image" content="https://www.promptova.com/logo.png" />
    <meta property="og:url" content="https://www.promptova.com/" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@promptova" />
    <meta name="twitter:title" content="Promptova – The AI Prompt Universe" />
    <meta name="twitter:description" content="Discover and copy premium AI image prompts." />
    <meta name="twitter:image" content="https://www.promptova.com/logo.png" />

    <!-- JSON-LD Website Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Promptova",
      "url": "https://www.promptova.com",
      "description": "The ultimate AI prompt gallery — discover, copy, and share the best Midjourney, Stable Diffusion, and ChatGPT prompts.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.promptova.com/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
